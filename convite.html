<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite — 15 Anos Lívia</title>
    <meta name="description"
        content="Você foi convidado para a festa de 15 anos da Lívia. Clique para abrir o convite.">
    <link rel="stylesheet" href="css/convite.css">
</head>

<body>

    <div class="sparkles" id="sparkles"></div>

    <!-- TELA 1: Imagem inicial -->
    <div class="screen active" id="screenInicio">
        <img src="convite/convite inicio.jpg" alt="Convite 15 Anos Lívia">
    </div>


    <!-- TELA 2: Vídeo -->
    <div class="screen" id="screenVideo">
        <!-- preload="auto" faz o browser carregar o vídeo em background desde o início -->
        <video id="conviteVideo" preload="auto" playsinline>
            <source src="convite/Video do convite.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TELA 3: Imagem final -->
    <div class="screen" id="screenFinal">
        <img id="finalImg" src="convite/Final Convite.jpg" alt="15 Anos Lívia">
    </div>

    <!-- Hotspot clicável sobre o botão da imagem final -->
    <div id="finalBtnOverlay"></div>

    <script src="js/convite.js"></script>

</body>

</html>
