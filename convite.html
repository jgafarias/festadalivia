<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Convite — 15 Anos Lívia</title>
    <meta name="description"
        content="Você foi convidado para a festa de 15 anos da Lívia. Clique para abrir o convite.">
    <style>
        *,
        *::before,
        *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        /* ── Partículas ── */
        .sparkles {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 0;
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            border-radius: 50%;
            opacity: 0;
            animation: twinkle var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
        }

        @keyframes twinkle {

            0%,
            100% {
                opacity: 0;
                transform: scale(0.5);
            }

            50% {
                opacity: 0.8;
                transform: scale(1.4);
            }
        }

        /* ── Telas ── */
        .screen {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .screen.active {
            display: flex;
        }

        .screen img,
        .screen video {
            height: 100vh;
            width: auto;
            display: block;
            object-fit: contain;
        }

        #screenInicio {
            cursor: pointer;
        }

        /* ── Área clicável do botão na imagem final ── */
        #finalBtnOverlay {
            position: fixed;
            z-index: 10;
            margin-top: -10px;
            cursor: pointer;
            border-radius: 50px;
            display: none;
        }
    </style>
</head>

<body>

    <div class="sparkles" id="sparkles"></div>

    <!-- TELA 1: Imagem inicial -->
    <div class="screen active" id="screenInicio">
        <img src="convite/convite inicio.jpg" alt="Convite 15 Anos Lívia">
    </div>

    <!-- TELA 1.5: Imagem antes do vídeo -->
    <div class="screen" id="screenInicioVideo">
        <img src="convite/Inicio video.jpg" alt="Abertura do Vídeo">
    </div>

    <!-- TELA 2: Vídeo -->
    <div class="screen" id="screenVideo">
        <!-- preload="auto" faz o browser carregar o vídeo em background desde o início -->
        <video id="conviteVideo" preload="auto" playsinline>
            <source src="convite/Video do convite.mp4" type="video/mp4">
        </video>
    </div>

    <!-- TELA 3: Imagem final -->
    <div class="screen" id="screenFinal">
        <img id="finalImg" src="convite/Final Convite.jpg" alt="15 Anos Lívia">
    </div>

    <!-- Hotspot clicável sobre o botão da imagem final -->
    <div id="finalBtnOverlay"></div>

    <script>
        /* ── Partículas ── */
        const sparklesContainer = document.getElementById('sparkles');
        for (let i = 0; i < 40; i++) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.setProperty('--dur', `${2 + Math.random() * 4}s`);
            s.style.setProperty('--delay', `${Math.random() * 5}s`);
            s.style.left = `${Math.random() * 100}%`;
            s.style.top = `${Math.random() * 100}%`;
            s.style.background = Math.random() > 0.5 ? '#d4af6a' : '#fff';
            sparklesContainer.appendChild(s);
        }

        /* ── Elementos ── */
        const screenInicio = document.getElementById('screenInicio');
        const screenVideo = document.getElementById('screenVideo');
        const screenFinal = document.getElementById('screenFinal');
        const video = document.getElementById('conviteVideo');
        const finalImg = document.getElementById('finalImg');
        const finalBtnOverlay = document.getElementById('finalBtnOverlay');

        /**
         * Posição do botão "VISITE O SITE DO EVENTO" dentro da imagem Final Convite.jpg
         * Expressas como porcentagem da largura/altura da imagem (0 a 1):
         *   top:    73%
         *   bottom: 81%
         *   left:   18%
         *   right:  82%
         * Ajuste esses valores caso o botão não fique preciso.
         */
        const BTN = { top: 0.68, bottom: 0.76, left: 0.25, right: 0.75 };

        /* Recalcula posição do hotspot com base no tamanho renderizado da imagem */
        function positionOverlay() {
            const rect = finalImg.getBoundingClientRect();
            if (rect.width === 0) return;

            finalBtnOverlay.style.top = `${rect.top + BTN.top * rect.height}px`;
            finalBtnOverlay.style.left = `${rect.left + BTN.left * rect.width}px`;
            finalBtnOverlay.style.width = `${(BTN.right - BTN.left) * rect.width}px`;
            finalBtnOverlay.style.height = `${(BTN.bottom - BTN.top) * rect.height}px`;
        }

        window.addEventListener('resize', positionOverlay);

        const screenInicioVideo = document.getElementById('screenInicioVideo');

        /* ── Troca de tela ── */
        function showScreen(el) {
            [screenInicio, screenInicioVideo, screenVideo, screenFinal].forEach(s => {
                s.classList.remove('active', 'fade-in');
            });
            void el.offsetWidth;
            el.classList.add('active', 'fade-in');
        }

        /* TELA 1 → TELA 1.5: Clique na imagem inicial */
        screenInicio.addEventListener('click', () => {
            showScreen(screenInicioVideo);
            // Inicia o vídeo automaticamente após 1 segundo
            setTimeout(() => {
                showScreen(screenVideo);
                video.currentTime = 0;
                video.play();
            }, 1000);
        });

        /* TELA 2 → TELA 3: Vídeo terminou */
        video.addEventListener('ended', () => {
            showScreen(screenFinal);
            finalBtnOverlay.style.display = 'block';
            positionOverlay();
        });

        /* TELA 3: Clique no botão da imagem final → vai para o convite */
        const goToSite = () => { window.location.href = 'index.html'; };
        finalBtnOverlay.addEventListener('click', goToSite);
        finalBtnOverlay.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === ' ') goToSite();
        });
    </script>

</body>

</html>
